version: '3.8'
services:
  platform:
    build: .
    container_name: bodygood-platform
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://bodygood:bodygood@postgres:5432/bodygood
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET}
      - PAYPAL_MODE=sandbox
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - STEDI_API_KEY=${STEDI_API_KEY}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bodygood
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: bodygood-platform-db
    environment:
      POSTGRES_USER: bodygood
      POSTGRES_PASSWORD: bodygood
      POSTGRES_DB: bodygood
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bodygood"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bodygood
    restart: unless-stopped

volumes:
  pgdata:

networks:
  bodygood:
    driver: bridge
